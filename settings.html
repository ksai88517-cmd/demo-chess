<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="CSS/pages.css">
</head>
<body>

<div class="page-container">

    <!-- Back Button -->
    <div class="back-top">
        <button class="back-btn" onclick="goBack()">
            ⬅ Back
        </button>
    </div>

    <h1>⚙ Settings</h1>

    <div class="card">

        <!-- Site Theme -->
        <div class="setting-item">

            <div class="setting-title">
                🌐 Site Theme
            </div>

            <div class="setting-desc">
                Change the appearance of the application.
            </div>

            <select id="siteTheme" class="settings-select">
                <option value="dark">🌙 Dark Mode</option>
                <option value="light">☀ Light Mode</option>
            </select>

        </div>

        <!-- Piece Theme -->
        <div class="setting-item">

            <div class="setting-title">
                ♟ Piece Theme
            </div>

            <div class="setting-desc">
                Choose the chess piece style.
            </div>

            <select
                id="pieceTheme"
                class="settings-select">

                <option value="classic">Classic</option>
                <option value="filled">Filled</option>
                <option value="outline">Outline</option>
                <option value="medieval">Medieval</option>

            </select>

        </div>

        <!-- Board Theme -->
        <div class="setting-item">

            <div class="setting-title">
                🎨 Board Theme
            </div>

            <div class="setting-desc">
                Choose the board style used in the game.
            </div>

            <select
                id="themeSetting"
                class="settings-select">

                <option value="classic">Classic Wood</option>
                <option value="dark">Dark</option>
                <option value="blue">Blue Tournament</option>
                <option value="green">Green Tournament</option>

            </select>

        </div>

        <!-- Volume -->
        <div class="setting-item">

            <div class="setting-title">
                🔊 Sound Volume
            </div>

            <div class="setting-desc">
                Control all game sounds.
            </div>

            <input
                type="range"
                id="volumeSlider"
                class="volume-slider"
                min="0"
                max="1"
                step="0.1"
                value="1">

            <p id="volumeValue">
                100%
            </p>

        </div>

        <!-- Mute -->
        <div class="setting-item">

            <div class="setting-title">
                🔇 Mute Sound
            </div>

            <div class="setting-desc">
                Disable all sounds.
            </div>

            <label class="toggle-row">

                <input
                    type="checkbox"
                    id="muteToggle">

                <span>
                    Mute all sounds
                </span>

            </label>

        </div>

    </div>

    <!-- Bottom Buttons -->
    <div class="settings-actions">

        <button onclick="window.location.href='index.html'">
            🏠 Home
        </button>

    </div>

</div>

<script src="JS/common.js"></script>
<script src="JS/login.js"></script>
<script src="JS/settings.js"></script>

</body>
</html>
